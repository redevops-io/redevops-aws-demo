# Deploy-and-operate demo — Sidekick governing the five operators over the /invoke contract.
#
#   Sidekick (agentic-os) ──discovers manifests, drives missions──▶ infra · edge-sentinel · operate
#                                                                   · agentic-compliance · agentic-privacy
#
# The operators run as their own services (operators/service.py, one shared image); Sidekick federates
# them via modules.yaml (see agentic-os/deploy/sidekick-devops/federation.py) — it never imports their
# code. This compose lives in the demo repo because the demo repo owns the operators.
#
# Bring up ($0 dry run — every operator short-circuits to its in-process simulator):
#   SIM=1 docker compose -f deploy/compose.demo.yml up --build
# Then open the Projects cockpit at http://localhost:8000/cockpit and run the deploy mission.
#
# Real mode (SIM=0, the default): operators shell out to terraform/aws/kubectl. Provide AWS creds
# (env or a mounted profile) — Sidekick resolves them from Vault via STS assume-role in the real flow.
#
# AGENTIC_OS_ROOT defaults to the sibling checkout (github.com/redevops-io/agentic-os next to this repo).
name: redevops-aws-demo

x-operator: &operator
  build:
    context: ..                                   # redevops-aws-demo repo root
    dockerfile: operators/Dockerfile
  image: redevops-aws-demo-operator:latest
  environment: &operator-env
    SIM: ${SIM:-0}                                # 0 = real terraform/aws/kubectl; 1 = $0 simulators
    AGENTIC_OS_ROOT: /opt/agentic-os
    PYTHONPATH: /app:/opt/agentic-os:/opt/agentic-os/apps
    # AWS creds for SIM=0 (optional; Sidekick injects Vault→STS creds in the real flow)
    AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
    AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
    AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
    AWS_REGION: ${AWS_REGION:-us-east-1}
  volumes:
    - ..:/app:ro                                  # operators/, infra/, missions/, aws_demo/
    - ${AGENTIC_OS_ROOT:-../../agentic-os}:/opt/agentic-os:ro
  restart: unless-stopped

services:
  # ── the five operators (one image, OPERATOR selects which) ──────────────────────────────────────
  infra:
    <<: *operator
    environment:
      <<: *operator-env
      OPERATOR: infra
      PORT: "8230"
      INFRA_DEPLOY_ROOT: /app/infra/terraform/envs/aws   # what `provision` plans/applies
    ports: ["8230:8230"]

  edge-sentinel:
    <<: *operator
    environment: {<<: *operator-env, OPERATOR: edge-sentinel, PORT: "8241"}
    ports: ["8241:8241"]

  operate:
    <<: *operator
    environment: {<<: *operator-env, OPERATOR: operate, PORT: "8242"}
    ports: ["8242:8242"]

  agentic-compliance:
    <<: *operator
    environment: {<<: *operator-env, OPERATOR: agentic-compliance, PORT: "8243"}
    ports: ["8243:8243"]

  agentic-privacy:
    <<: *operator
    environment: {<<: *operator-env, OPERATOR: agentic-privacy, PORT: "8244"}
    ports: ["8244:8244"]

  # ── Sidekick (agentic-os) — governs the operators above via modules.yaml ────────────────────────
  sidekick:
    build:
      context: ${AGENTIC_OS_ROOT:-../../agentic-os}
      dockerfile: deploy/sidekick-devops/Dockerfile
    image: sidekick-devops:latest
    ports: ["8000:8000"]
    environment:
      MODEL_ENDPOINT: ${MODEL_ENDPOINT:-}
      SIDEKICK_MODULES: /app/modules.yaml         # → federate the five operators
      OPERATOR_TIMEOUT: ${OPERATOR_TIMEOUT:-60}
      MONITOR_ENABLED: ${MONITOR_ENABLED:-1}
      ALERT_WEBHOOK_URL: ${ALERT_WEBHOOK_URL:-}
    volumes:
      - ../operators/modules.yaml:/app/modules.yaml:ro
    depends_on: [infra, edge-sentinel, operate, agentic-compliance, agentic-privacy]
    restart: unless-stopped
